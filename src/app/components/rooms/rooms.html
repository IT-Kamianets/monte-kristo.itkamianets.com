<section class="rooms-page">
  <div class="container">
    <h1 class="page-title">Наші Номери</h1>
    
    <div class="rooms-grid">
      <div class="room-card" *ngFor="let room of rooms">
        
        <div class="room-image">
          <img [src]="room.image" [alt]="room.title">
        </div>
        
        <div class="room-details">
          <h2>{{ room.title }}</h2>
          <p class="desc">{{ room.desc }}</p>
          <span class="price">{{ room.price }} <small>/ ніч</small></span>
          <div class="room-actions">
            <a [routerLink]="['/rooms', room.id]" class="btn-details">Детальніше</a>
            <button class="btn-book" (click)="openBooking()">Забронювати</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
