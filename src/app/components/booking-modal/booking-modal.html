<div class="modal-overlay" *ngIf="isOpen$ | async" (click)="onOverlayClick($event)">
  <div class="modal-box">

    <button class="modal-close" (click)="close()">✕</button>

    <ng-container *ngIf="status !== 'success'; else successTpl">
      <h2 class="modal-title">Забронювати номер</h2>
      <p class="modal-subtitle">Залиште свої дані — ми зв'яжемося з вами найближчим часом</p>

      <form class="modal-form" (ngSubmit)="submit()">
        <div class="form-group">
          <label>Ім'я</label>
          <input
            type="text"
            [(ngModel)]="name"
            name="name"
            placeholder="Ваше ім'я"
            required>
        </div>

        <div class="form-group">
          <label>Номер телефону</label>
          <input
            type="tel"
            [(ngModel)]="phone"
            name="phone"
            placeholder="+38 (0__) ___ __ __"
            required>
        </div>

        <p class="form-error" *ngIf="status === 'error'">
          Помилка надсилання. Спробуйте ще раз.
        </p>

        <button type="submit" class="btn-submit" [disabled]="status === 'loading'">
          {{ status === 'loading' ? 'Надсилання...' : 'Надіслати заявку' }}
        </button>
      </form>
    </ng-container>

    <ng-template #successTpl>
      <div class="success-msg">
        <div class="success-icon">✓</div>
        <h2>Заявку отримано!</h2>
        <p>Ми зв'яжемося з вами найближчим часом.</p>
        <button class="btn-submit" (click)="close()">Закрити</button>
      </div>
    </ng-template>

  </div>
</div>
